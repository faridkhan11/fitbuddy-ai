<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>FitBuddy AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">
<div class="container-fluid">

<span class="navbar-brand mb-0 h1">🏋️ FitBuddy AI Dashboard</span>

</div>
</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-5">

<div class="card shadow-lg border-0">

<div class="card-header bg-primary text-white">

<h5 class="mb-0">Generate Fitness Plan</h5>

</div>

<div class="card-body">

<form action="/generate" method="post">

<div class="mb-3">

<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Age</label>
<input type="number" name="age" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Weight</label>
<input type="number" name="weight" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Fitness Goal</label>

<select name="goal" class="form-select">

<option>Weight Loss</option>
<option>Muscle Gain</option>
<option>General Fitness</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Workout Intensity</label>

<select name="intensity" class="form-select">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

</div>

<button class="btn btn-primary w-100">

Generate AI Plan

</button>

</form>

</div>
</div>
</div>

<div class="col-md-7">

<div class="card shadow-lg border-0">

<div class="card-header bg-success text-white">

<h5 class="mb-0">Your AI Generated Plan</h5>

</div>

<div class="card-body">

{% if plan %}

<pre class="plan-output">{{plan}}</pre>

{% else %}

<p class="text-muted">

Fill the form and generate your personalized AI fitness plan.

</p>

{% endif %}

</div>
</div>

</div>

</div>

</div>

</body>

</html>
